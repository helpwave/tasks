name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --output-format=concise --exclude database/migrations

  simulator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: simulator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        working-directory: simulator
        run: |
          pip install ruff
          ruff check . --output-format=concise

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Check translation keys
        working-directory: web
        run: npm run check-translations

      - name: Unit tests
        working-directory: web
        run: npm run test

  backend-tests:
    needs: [backend-lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/unit -v --cov=api --cov=database --cov-report=xml --cov-report=term

      - name: Run integration tests
        working-directory: backend
        run: |
          pytest tests/integration -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  e2e-tests:
    needs: [frontend]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      ISSUER_URI: http://localhost:8080/realms/tasks
      PUBLIC_ISSUER_URI: http://localhost:8080/realms/tasks
      CLIENT_ID: tasks-backend
      CLIENT_SECRET: tasks-secret
      ENV: test
      INFLUXDB_URL: http://localhost:8086
      INFLUXDB_TOKEN: test-token
      INFLUXDB_ORG: test
      INFLUXDB_BUCKET: test
      NEXT_PUBLIC_API_URL: http://localhost:8000/graphql
      E2E_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend server
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Start frontend server
        working-directory: web
        run: |
          npm start > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for servers
        run: |
          echo "Waiting for backend..."
          timeout 120 bash -c 'until curl -f -s http://localhost:8000/health > /dev/null 2>&1; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until curl -f -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'

      - name: Run E2E tests
        working-directory: tests
        env:
          CI: true
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7

  ci:
    name: CI
    needs: [backend-tests, simulator-lint, frontend, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" ]] \
            || [[ "${{ needs.simulator-lint.result }}" != "success" ]] \
            || [[ "${{ needs.frontend.result }}" != "success" ]] \
            || [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "One or more required jobs failed or were skipped."
            exit 1
          fi
