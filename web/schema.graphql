  avatarUrl: String!
}

input UpdatePropertyDefinitionInput {
  name: String = null
  description: String = null
  options: [String!] = null
  isActive: Boolean = null
  allowedEntities: [PropertyEntity!] = null
}

input UpdateSavedViewInput {
  name: String = null
  filterDefinition: String = null
  sortDefinition: String = null
  parameters: String = null
  visibility: SavedViewVisibility = null
}

input UpdateTaskInput {
  title: String = null
  description: String = null
  done: Boolean = null
  dueDate: DateTime
  assigneeId: ID = null
  assigneeTeamId: ID
  previousTaskIds: [ID!] = null
  properties: [PropertyValueInput!] = null
