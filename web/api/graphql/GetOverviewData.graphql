query GetOverviewData($rootLocationIds: [ID!], $recentPatientsFilters: [QueryFilterClauseInput!], $recentPatientsSorts: [QuerySortClauseInput!], $recentPatientsPagination: PaginationInput, $recentPatientsSearch: QuerySearchInput, $recentTasksFilters: [QueryFilterClauseInput!], $recentTasksSorts: [QuerySortClauseInput!], $recentTasksPagination: PaginationInput, $recentTasksSearch: QuerySearchInput) {
  recentPatients(rootLocationIds: $rootLocationIds, filters: $recentPatientsFilters, sorts: $recentPatientsSorts, pagination: $recentPatientsPagination, search: $recentPatientsSearch) {
    id
    name
    firstname
    lastname
    sex
    birthdate
    state
    position {
      id
      title
      kind
      parent {
        id
        title
      }
    }
    tasks {
      id
      done
      updateDate
    }
    properties {
      id
      definition {
        id
        name
        description
        fieldType
        isActive
        allowedEntities
        options
      }
      textValue
      numberValue
      booleanValue
      dateValue
      dateTimeValue
      selectValue
      multiSelectValues
      userValue
      user {
        id
        name
        avatarUrl
        lastOnline
        isOnline
      }
      team {
        id
        title
        kind
      }
    }
  }
  recentPatientsTotal(rootLocationIds: $rootLocationIds, filters: $recentPatientsFilters, sorts: $recentPatientsSorts, search: $recentPatientsSearch)
  recentTasks(rootLocationIds: $rootLocationIds, filters: $recentTasksFilters, sorts: $recentTasksSorts, pagination: $recentTasksPagination, search: $recentTasksSearch) {
    id
    title
    description
    done
    dueDate
    creationDate
    updateDate
    priority
    estimatedTime
    sourceTaskPresetId
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
    assigneeTeam {
      id
      title
      kind
    }
    patient {
      id
      name
      position {
        id
        title
        kind
        parent {
          id
          title
        }
      }
    }
    properties {
      id
      definition {
        id
        name
        description
        fieldType
        isActive
        allowedEntities
        options
      }
      textValue
      numberValue
      booleanValue
      dateValue
      dateTimeValue
      selectValue
      multiSelectValues
      userValue
      user {
        id
        name
        avatarUrl
        lastOnline
        isOnline
      }
      team {
        id
        title
        kind
      }
    }
  }
  recentTasksTotal(rootLocationIds: $rootLocationIds, filters: $recentTasksFilters, sorts: $recentTasksSorts, search: $recentTasksSearch)
}
