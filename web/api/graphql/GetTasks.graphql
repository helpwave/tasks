query GetTasks($rootLocationIds: [ID!], $assigneeId: ID, $assigneeTeamId: ID, $filters: [QueryFilterClauseInput!], $sorts: [QuerySortClauseInput!], $pagination: PaginationInput, $search: QuerySearchInput) {
  tasks(rootLocationIds: $rootLocationIds, assigneeId: $assigneeId, assigneeTeamId: $assigneeTeamId, filters: $filters, sorts: $sorts, pagination: $pagination, search: $search) {
    id
    title
    description
    done
    dueDate
    priority
    estimatedTime
    creationDate
    updateDate
    sourceTaskPresetId
    patient {
      id
      name
      firstname
      lastname
      birthdate
      sex
      state
      assignedLocation {
        id
        title
        parent {
          id
          title
        }
      }
      assignedLocations {
        id
        title
        kind
        parent {
          id
          title
          parent {
            id
            title
            parent {
              id
              title
            }
          }
        }
      }
      clinic {
        id
        title
        kind
        parent {
          id
          title
          parent {
            id
            title
            parent {
              id
              title
              parent {
                id
                title
              }
            }
          }
        }
      }
      position {
        id
        title
        kind
        parent {
          id
          title
          kind
          parent {
            id
            title
            kind
            parent {
              id
              title
              kind
            }
          }
        }
      }
      teams {
        id
        title
        kind
        parent {
          id
          title
          parent {
            id
            title
            parent {
              id
              title
              parent {
                id
                title
              }
            }
          }
        }
      }
      properties {
        id
        definition {
          id
          name
          description
          fieldType
          isActive
          allowedEntities
          options
        }
        textValue
        numberValue
        booleanValue
        dateValue
        dateTimeValue
        selectValue
        multiSelectValues
        userValue
        user {
          id
          name
          avatarUrl
          lastOnline
          isOnline
        }
        team {
          id
          title
          kind
        }
      }
    }
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
    assigneeTeam {
      id
      title
      kind
    }
    properties {
      id
      definition {
        id
        name
        description
        fieldType
        isActive
        allowedEntities
        options
      }
      textValue
      numberValue
      booleanValue
      dateValue
      dateTimeValue
      selectValue
      multiSelectValues
      userValue
      user {
        id
        name
        avatarUrl
        lastOnline
        isOnline
      }
      team {
        id
        title
        kind
      }
    }
  }
  tasksTotal(rootLocationIds: $rootLocationIds, assigneeId: $assigneeId, assigneeTeamId: $assigneeTeamId, filters: $filters, sorts: $sorts, search: $search)
}
