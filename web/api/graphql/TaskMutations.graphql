mutation CreateTask($data: CreateTaskInput!) {
  createTask(data: $data) {
    id
    title
    description
    done
    dueDate
    updateDate
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
    patient {
      id
      name
    }
  }
}

mutation UpdateTask($id: ID!, $data: UpdateTaskInput!) {
  updateTask(id: $id, data: $data) {
    id
    title
    description
    done
    dueDate
    priority
    estimatedTime
    updateDate
    checksum
    patient {
      id
      name
    }
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
    properties {
      id
      definition {
        id
        name
        description
        fieldType
        isActive
        allowedEntities
        options
      }
      textValue
      numberValue
      booleanValue
      dateValue
      dateTimeValue
      selectValue
      multiSelectValues
      userValue
      user {
        id
        name
        avatarUrl
        lastOnline
        isOnline
      }
      team {
        id
        title
        kind
      }
    }
  }
}

mutation AddTaskAssignee($id: ID!, $userId: ID!) {
  addTaskAssignee(id: $id, userId: $userId) {
    id
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
  }
}

mutation RemoveTaskAssignee($id: ID!, $userId: ID!) {
  removeTaskAssignee(id: $id, userId: $userId) {
    id
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
  }
}

mutation DeleteTask($id: ID!) {
  deleteTask(id: $id)
}

mutation CompleteTask($id: ID!) {
  completeTask(id: $id) {
    id
    done
    updateDate
  }
}

mutation ReopenTask($id: ID!) {
  reopenTask(id: $id) {
    id
    done
    updateDate
  }
}

mutation AssignTaskToTeam($id: ID!, $teamId: ID!) {
  assignTaskToTeam(id: $id, teamId: $teamId) {
    id
    assigneeTeam {
      id
      title
      kind
    }
  }
}

mutation UnassignTaskFromTeam($id: ID!) {
  unassignTaskFromTeam(id: $id) {
    id
    assigneeTeam {
      id
      title
      kind
    }
  }
}

mutation ApplyTaskGraph($data: ApplyTaskGraphInput!) {
  applyTaskGraph(data: $data) {
    id
    title
    description
    done
    dueDate
    updateDate
    sourceTaskPresetId
    assignees {
      id
      name
      avatarUrl
      lastOnline
      isOnline
    }
    patient {
      id
      name
    }
  }
}
