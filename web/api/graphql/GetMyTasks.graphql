query GetMyTasks {
  me {
    id
    tasks {
      id
      title
      description
      done
      dueDate
      priority
      estimatedTime
      creationDate
      updateDate
      patient {
        id
        name
        assignedLocation {
          id
          title
          parent {
            id
            title
          }
        }
        assignedLocations {
          id
          title
          kind
          parent {
            id
            title
            parent {
              id
              title
            }
          }
        }
      }
      assignees {
        id
        name
        avatarUrl
        lastOnline
        isOnline
      }
    }
  }
}
